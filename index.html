<!DOCTYPE html>
<!-- investment-advisor v4: 真實資料 + 公司基本資料 + 投資人屬性問卷 -->
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資建議系統</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Microsoft JhengHei','PingFang TC',sans-serif; margin:0; padding:20px; background:linear-gradient(135deg,#f5f7fa,#e4edf5); min-height:100vh; }
        .container { max-width:720px; margin:0 auto; background:white; padding:32px; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
        h1 { text-align:center; color:#1a2a3a; margin:0 0 6px; font-size:26px; }
        .subtitle { text-align:center; color:#7f8c8d; font-size:14px; margin-bottom:24px; }
        .section { margin-bottom:30px; }
        .section-title { font-size:18px; font-weight:700; color:#1a2a3a; margin-bottom:14px; border-left:4px solid #3498db; padding-left:10px; }
        .input-group { display:flex; gap:12px; }
        input[type="text"] { flex:1; padding:14px 18px; border:2px solid #e0e6ed; border-radius:10px; font-size:16px; transition:border-color .3s; }
        input[type="text"]:focus { outline:none; border-color:#3498db; }
        button { padding:14px 26px; background:linear-gradient(135deg,#3498db,#2c3e50); color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:transform .2s,box-shadow .2s; white-space:nowrap; }
        button:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(52,152,219,.35); }
        button:active { transform:translateY(0); }
        #result { margin-top:8px; }
        .placeholder { text-align:center; color:#95a5a6; padding:40px 20px; font-size:15px; }
        .stock-header { display:flex; align-items:baseline; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
        .stock-name { font-size:22px; font-weight:700; color:#1a2a3a; }
        .stock-code { font-size:15px; color:#7f8c8d; }
        .stock-industry { font-size:13px; background:#eaf2fb; color:#2471a3; padding:3px 10px; border-radius:20px; }
        .stock-date { font-size:13px; color:#a0aab2; margin-left:auto; }
        .stock-price { width:100%; text-align:left; margin-bottom:14px; }
        .price-num { font-size:30px; font-weight:700; color:#1a2a3a; }
        .price-change { font-size:16px; font-weight:600; margin-left:10px; }
        .up { color:#e74c3c; } .down { color:#27ae60; } .flat { color:#7f8c8d; }
        .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
        .metric { background:#f8fafc; border:1px solid #edf1f5; border-radius:10px; padding:12px 8px; text-align:center; }
        .metric-label { font-size:12px; color:#7f8c8d; margin-bottom:4px; }
        .metric-value { font-size:16px; font-weight:600; color:#1a2a3a; }
        .info-box { background:#fbfcfe; border:1px solid #edf1f5; border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:14px; line-height:1.8; color:#34495e; }
        .tags { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        .tag { font-size:12px; padding:4px 10px; border-radius:20px; font-weight:600; }
        .tag-pos { background:#e8f8f0; color:#1e8449; } .tag-neu { background:#eaf2fb; color:#2471a3; } .tag-warn { background:#fef5e7; color:#b9770e; }
        .advice { background:linear-gradient(135deg,#eef6ff,#f4f9ff); border-left:4px solid #3498db; border-radius:10px; padding:18px 20px; line-height:1.7; color:#2c3e50; font-size:15px; }
        .advice-title { font-weight:700; color:#1a2a3a; margin-bottom:8px; font-size:16px; }
        .disclaimer { margin-top:18px; font-size:12px; color:#a0aab2; line-height:1.6; border-top:1px dashed #e0e6ed; padding-top:12px; }
        .ratio-sec { margin-top:12px; }
        .ratio-sec-title { font-weight:700; color:#1a2a3a; font-size:14px; margin-bottom:6px; }
        .ratio-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px 18px; }
        .ratio-item { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; border-bottom:1px dotted #eef2f6; font-size:13px; }
        .ratio-item .rl { color:#64748b; } .ratio-item .rv { font-weight:700; color:#1f3a5f; font-variant-numeric:tabular-nums; }
        .dupont { margin-top:12px; padding:10px 12px; background:#f0f4ff; border-radius:8px; font-size:13px; line-height:1.7; color:#2c3e50; }
        .dupont b { color:#1f3a5f; }
        .loading { text-align:center; color:#95a5a6; padding:40px; font-style:italic; }
        .error-box { background:#fdf2f2; border-left:4px solid #e74c3c; border-radius:10px; padding:18px 20px; color:#c0392b; line-height:1.7; }
        .src { text-align:center; font-size:12px; color:#b0b8be; margin-top:8px; }
        /* 問卷 */
        .q-row { margin-bottom:16px; }
        .q-label { font-size:14px; font-weight:600; color:#2c3e50; margin-bottom:8px; }
        .opts { display:flex; flex-wrap:wrap; gap:8px; }
        .opt { font-size:13px; padding:8px 14px; border:2px solid #e0e6ed; border-radius:20px; cursor:pointer; background:white; color:#34495e; transition:all .2s; }
        .opt:hover { border-color:#3498db; }
        .opt.sel { background:#3498db; border-color:#3498db; color:white; }
        .rec-list { display:flex; flex-direction:column; gap:10px; }
        .rec-card { display:flex; align-items:center; gap:12px; background:#f8fafc; border:1px solid #edf1f5; border-radius:10px; padding:12px 16px; }
        .rec-rank { font-size:20px; font-weight:700; color:#3498db; width:28px; text-align:center; }
        .rec-info { flex:1; }
        .rec-name { font-weight:700; color:#1a2a3a; font-size:15px; }
        .rec-ind { font-size:12px; color:#7f8c8d; }
        .rec-score { font-size:12px; color:#2471a3; }
        .rec-card { transition:all .15s ease; }
        .rec-card:hover { background:#eef6ff; border-color:#3498db; transform:translateY(-1px); box-shadow:0 3px 10px rgba(52,152,219,.12); }
        .rec-card:active { transform:translateY(0); }
        .rec-go { font-size:13px; font-weight:700; color:#3498db; background:#eaf2fb; border-radius:8px; padding:6px 12px; white-space:nowrap; }
        .rec-card:hover .rec-go { background:#3498db; color:#fff; }
        /* 財務指標 tooltip */
        .ratio-item .rl { display:inline-flex; align-items:center; gap:3px; }
        .qm { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; background:#cbd5e1; color:#fff; font-size:10px; font-weight:700; cursor:help; position:relative; }
        .qm:hover { background:#3498db; }
        .qm .tip { visibility:hidden; opacity:0; position:absolute; bottom:130%; left:50%; transform:translateX(-50%); width:240px; background:#1f3a5f; color:#fff; font-size:11px; line-height:1.6; font-weight:400; padding:8px 10px; border-radius:8px; z-index:50; transition:opacity .15s; text-align:left; box-shadow:0 4px 14px rgba(0,0,0,.2); }
        .qm .tip b { color:#7fd1ff; }
        .qm:hover .tip { visibility:visible; opacity:1; }
        @media (max-width:480px){ .container{padding:20px;} .input-group{flex-direction:column;} .metrics{grid-template-columns:1fr 1fr;} }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 投資建議系統</h1>
        <div class="subtitle">真實資料 · 技術指標 · 企業基本資料 · 投資人屬性問卷</div>

        <div class="section">
            <div class="section-title">🔍 個股分析</div>
            <div class="input-group">
                <input type="text" id="ticker" placeholder="輸入台股代號（例如 2330）" maxlength="6">
                <button id="fetchBtn">取得建議</button>
            </div>
            <div id="result"><div class="placeholder">請輸入股票代號以取得投資分析</div></div>
            <div class="src">資料來源：FinMind 台灣金融資料集（公開 API）</div>
        </div>

        <div class="section">
            <div class="section-title">📋 投資人屬性問卷</div>
            <div class="q-row"><div class="q-label">1. 您的年齡層？</div><div class="opts" data-q="age">
                <span class="opt" data-v="young">30 歲以下</span>
                <span class="opt" data-v="mid">31–55 歲</span>
                <span class="opt" data-v="old">56 歲以上</span>
            </div></div>
            <div class="q-row"><div class="q-label">2. 預計投資期限？</div><div class="opts" data-q="horizon">
                <span class="opt" data-v="short">短線（&lt;1 年）</span>
                <span class="opt" data-v="mid">中期（1–5 年）</span>
                <span class="opt" data-v="long">長期（&gt;5 年）</span>
            </div></div>
            <div class="q-row"><div class="q-label">3. 風險承受度？</div><div class="opts" data-q="risk">
                <span class="opt" data-v="conservative">保守（怕虧損）</span>
                <span class="opt" data-v="moderate">穩健（可承受小幅波動）</span>
                <span class="opt" data-v="aggressive">積極（追求高報酬）</span>
            </div></div>
            <div class="q-row"><div class="q-label">4. 是否重視股利收入？</div><div class="opts" data-q="income">
                <span class="opt" data-v="yes">是，重視現金流</span>
                <span class="opt" data-v="no">否，重視資本利得</span>
            </div></div>
            <div class="q-row"><div class="q-label">5. 偏好產業？</div><div class="opts" data-q="industry">
                <span class="opt" data-v="tech">科技/半導體</span>
                <span class="opt" data-v="finance">金融/高殖利率</span>
                <span class="opt" data-v="traditional">傳統產業</span>
                <span class="opt" data-v="esg">永續/ESG</span>
                <span class="opt" data-v="any">皆可</span>
            </div></div>
            <button id="quizBtn">依屬性推薦標的</button>
            <div id="quizResult" style="margin-top:18px;"></div>
        </div>
    </div>

    <script src="stockdb.js"></script>
    <script>
        const API='https://api.finmindtrade.com/api/v4/data';
        const REALTIME_PROXY='https://twse-realtime-proxy.g0355511.workers.dev/?code=';
        const fmtDate=d=>d.toISOString().slice(0,10);
        async function getJSON(dataset,ticker,days){
            const end=fmtDate(new Date());
            const s=new Date(); s.setDate(s.getDate()-days); const start=fmtDate(s);
            const url=`${API}?dataset=${dataset}&data_id=${ticker}&start_date=${start}&end_date=${end}`;
            const r=await fetch(url); const j=await r.json();
            return (j.msg==='success'&&j.data)?j.data:null;
        }
        function ma(c,n){ return c.length>=n?c.slice(-n).reduce((a,b)=>a+b,0)/n:null; }
        function rsi(c,n=14){
            if(c.length<n+1) return null;
            const d=[]; for(let i=1;i<c.length;i++) d.push(c[i]-c[i-1]);
            const l=d.slice(-n);
            const up=l.filter(x=>x>0).reduce((a,b)=>a+b,0)/n;
            const dn=l.filter(x=>x<0).reduce((a,b)=>a-b,0)/n;
            if(dn===0) return 100;
            return Math.round((100-100/(1+up/dn))*10)/10;
        }
        async function getRealtime(ticker){
            try{
                const r=await fetch(REALTIME_PROXY+ticker);
                const t=await r.text();
                const j=JSON.parse(t);
                if(j.msgArray&&j.msgArray[0]){
                    const o=j.msgArray[0];
                    const price=parseFloat(o.pz);
                    const prev=parseFloat(o.z||o.y);
                    const time=o['%']||'';
                    const up=(o['a']||'').split('_').filter(x=>x).map(Number);
                    const dn=(o['b']||'').split('_').filter(x=>x).map(Number);
                    return { price, prev, time, asks:up, bids:dn, ok:true };
                }
                return { ok:false };
            }catch(e){ return { ok:false }; }
        }
        async function getInfo(ticker){
            const url=`${API}?dataset=TaiwanStockInfo&data_id=${ticker}`;
            const r=await fetch(url); const j=await r.json();
            if(j.msg==='success'&&j.data&&j.data.length){ return j.data[j.data.length-1]; }
            return null;
        }
        async function getFin(ticker, isFinance){
            const rows=await getJSON('TaiwanStockFinancialStatements',ticker,200);
            if(!rows) return null;
            const latest=rows[rows.length-1].date;
            const items=rows.filter(r=>r.date===latest);
            const get=t=>{ const x=items.find(r=>r.type===t); return x?x.value:null; };
            const revenue=get('Revenue');
            const netIncome=get(isFinance?'IncomeAfterTax':'IncomeAfterTaxes');
            let eps=get('EPS');
            if((eps===null||eps===undefined) && isFinance && netIncome!==null){
                // 金融業用普通股股本(面額10元)推算股數
                const shareRows=await getJSON('TaiwanStockBalanceSheet',ticker,200);
                if(shareRows&&shareRows.length){
                    const sli=shareRows[shareRows.length-1].date;
                    const sitems=shareRows.filter(r=>r.date===sli);
                    const sg=t=>{const x=sitems.find(r=>r.type===t);return x?x.value:null;};
                    const ordinary=sg('OrdinaryShare');
                    if(ordinary) eps=netIncome/(ordinary/10);
                }
            }
            return { date:latest, eps, revenue, grossProfit:get('GrossProfit'), netIncome, isFinance };
        }
        function fmtNum(v){
            if(v===null||v===undefined) return '—';
            if(Math.abs(v)>=1e8) return (v/1e8).toFixed(2)+' 億';
            if(Math.abs(v)>=1e4) return (v/1e4).toFixed(2)+' 萬';
            return v.toLocaleString();
        }
        // 本益比特殊顯示邏輯：
        //  - null/undefined → 缺資料
        //  - 0 且 EPS<=0(虧損) → 因虧損，不適用
        //  - 0 但 EPS>0 → 資料異常（有獲利卻本益比為0）
        //  - 正常數值 → 顯示數值
        function perDisplay(per, eps){
            if(per===null||per===undefined) return '—';
            if(per===0){
                if(eps!==null && eps!==undefined && eps<=0) return '因虧損，不適用';
                return '資料異常（有獲利但本益比為 0）';
            }
            return per;
        }
        // 資產負債表（支援金融業）
        async function getBalanceSheet(ticker, isFinance){
            const rows=await getJSON('TaiwanStockBalanceSheet',ticker,200);
            if(!rows||!rows.length) return null;
            const latest=rows[rows.length-1].date;
            const items=rows.filter(r=>r.date===latest);
            const get=t=>{ const x=items.find(r=>r.type===t); return x?x.value:null; };
            if(isFinance){
                return {
                    date:latest, isFinance:true,
                    cash:get('CashAndCashEquivalents'),
                    currentLiab:get('CurrentContractLiabilities'),  // 金融業以保險契約/短期負債近似
                    totalAssets:get('TotalAssets'),
                    totalLiab:get('Liabilities'),
                    equity:get('Equity')
                };
            }
            return {
                date:latest, isFinance:false,
                currentAssets:get('CurrentAssets'),
                currentLiab:get('CurrentLiabilities'),
                inventory:get('Inventories'),
                ar:get('AccountsReceivableNet'),
                ap:get('AccountsPayable'),
                fixedAssets:get('PropertyPlantAndEquipment'),
                totalAssets:get('TotalAssets'),
                totalLiab:get('Liabilities'),
                equity:get('Equity')
            };
        }
        // 財務比率（結合損益表 + 資產負債表，支援金融業）
        async function getRatios(ticker, isFinance){
            const [bs, fin, perArr]=await Promise.all([getBalanceSheet(ticker,isFinance),getFin(ticker,isFinance),getJSON('TaiwanStockPER',ticker,30)]);
            if(!bs) return null;
            const per=(perArr&&perArr.length)?perArr[perArr.length-1]:null;
            const rev=fin?fin.revenue:null;
            const finRows=await getJSON('TaiwanStockFinancialStatements',ticker,200);
            let cost=null, opIncome=null, preTax=null, netIncome=fin?fin.netIncome:null, netIntInc=null;
            if(finRows&&finRows.length){
                const li=finRows[finRows.length-1].date;
                const items=finRows.filter(r=>r.date===li);
                const g=t=>{const x=items.find(r=>r.type===t);return x?x.value:null;};
                cost=g('CostOfGoodsSold');
                opIncome=g(isFinance?'NetInterestIncome':'OperatingIncome');
                netIntInc=g('NetInterestIncome');
                preTax=g('PreTaxIncome');
                if(netIncome===null) netIncome=g(isFinance?'IncomeAfterTax':'IncomeAfterTaxes');
            }
            const N_A='金融業不適用';
            const r={ date:bs.date, isFinance };
            // 1. 流動性
            if(isFinance){
                r.cashRatio=(bs.cash&&bs.totalLiab)?bs.cash/bs.totalLiab*100:null; // 現金佔總負債比
                r.currentRatio=N_A; r.quickRatio=N_A;
            }else{
                r.currentRatio=(bs.currentAssets&&bs.currentLiab)?bs.currentAssets/bs.currentLiab:null;
                const quick=(bs.currentAssets&&bs.inventory!=null)?bs.currentAssets-bs.inventory:null;
                r.quickRatio=(quick!=null&&bs.currentLiab)?quick/bs.currentLiab:null;
            }
            // 2. 資產管理
            if(isFinance){
                if(rev&&bs.totalAssets) r.taTurnover=rev/bs.totalAssets;
                r.arTurnover=N_A; r.arDays=N_A; r.invTurnover=N_A; r.invDays=N_A; r.apTurnover=N_A; r.apDays=N_A; r.faTurnover=N_A;
            }else{
                if(rev&&bs.ar) r.arTurnover=rev/bs.ar;
                if(r.arTurnover) r.arDays=365/r.arTurnover;
                if(cost!=null&&bs.inventory) r.invTurnover=cost/bs.inventory;
                if(r.invTurnover) r.invDays=365/r.invTurnover;
                if(rev&&bs.ap) r.apTurnover=rev/bs.ap;
                if(r.apTurnover) r.apDays=365/r.apTurnover;
                if(rev&&bs.fixedAssets) r.faTurnover=rev/bs.fixedAssets;
                if(rev&&bs.totalAssets) r.taTurnover=rev/bs.totalAssets;
            }
            // 3. 負債管理
            r.debtRatio=(bs.totalLiab&&bs.totalAssets)?bs.totalLiab/bs.totalAssets*100:null;
            // 4. 獲利能力
            if(isFinance){
                r.grossMargin=N_A; r.opMargin=N_A;
                if(netIntInc!=null&&bs.totalAssets) r.nim=netIntInc/bs.totalAssets*100; // 淨利差 NIM
                if(netIntInc!=null&&rev) r.netIntRatio=netIntInc/rev*100; // 利息淨收益率
                if(netIncome!=null&&rev) r.netMargin=netIncome/rev*100;
            }else{
                const gp=(rev&&cost!=null)?rev-cost:null;
                if(gp!=null&&rev) r.grossMargin=gp/rev*100;
                if(opIncome!=null&&rev) r.opMargin=opIncome/rev*100;
                if(netIncome!=null&&rev) r.netMargin=netIncome/rev*100;
            }
            if(netIncome!=null&&bs.totalAssets) r.roa=netIncome/bs.totalAssets*100;
            if(netIncome!=null&&bs.equity) r.roe=netIncome/bs.equity*100;
            // 5. 本益比 / 市價淨值比
            r.per=(per&&per.PER!=null&&per.PER!==0)?per.PER:null;
            r.pbr=(per&&per.PBR!=null)?per.PBR:null;
            // 6. 杜邦方程式
            if(isFinance){
                // 金融業簡化：ROE = ROA × 權益乘數（無資產周轉概念）
                if(r.roa!=null && bs.totalAssets && bs.equity){
                    const equityMult=bs.totalAssets/bs.equity;
                    r.dupont={ roa:r.roa/100, equityMult, roe:r.roa/100*equityMult*100, finance:true };
                }
            }else if(r.netMargin!=null && r.taTurnover && bs.totalAssets && bs.equity){
                const equityMult=bs.totalAssets/bs.equity;
                r.dupont={ netMargin:r.netMargin/100, taTurnover:r.taTurnover, equityMult, roe:r.netMargin/100*r.taTurnover*equityMult*100 };
            }
            return r;
        }
        function buildAdvice({close,prevClose,per,ma20,ma60,rsiVal}){
            const chg=((close-prevClose)/prevClose*100);
            const tags=[],reasons=[];
            if(ma20&&ma60){
                if(close>ma20&&ma20>ma60){tags.push(['多頭排列','tag-pos']);reasons.push('股價站穩月線與季線之上，中長期趨勢偏多。');}
                else if(close<ma20&&ma20<ma60){tags.push(['空頭排列','tag-warn']);reasons.push('股價跌破月線與季線，短期留意下行風險。');}
                else {tags.push(['盤整格局','tag-neu']);reasons.push('均線糾結，目前區間盤整，方向未明。');}
            }
            if(per&&per.PER){
                if(per.PER<15){tags.push(['本益比偏低','tag-pos']);reasons.push(`本益比 ${per.PER} 相對低位，具價值投資吸引力。`);}
                else if(per.PER>30){tags.push(['本益比偏高','tag-warn']);reasons.push(`本益比 ${per.PER} 偏高，須注意評價合理性。`);}
                else{tags.push(['本益比合理','tag-neu']);reasons.push(`本益比 ${per.PER} 中性區間，估值尚稱合理。`);}
            }
            if(rsiVal!==null){
                if(rsiVal>=70){tags.push(['RSI過熱','tag-warn']);reasons.push(`RSI ${rsiVal} 超買，短期或面臨賣壓。`);}
                else if(rsiVal<=30){tags.push(['RSI超賣','tag-pos']);reasons.push(`RSI ${rsiVal} 超賣，具技術反彈條件。`);}
                else{tags.push(['RSI中性','tag-neu']);reasons.push(`RSI ${rsiVal} 中性區間。`);}
            }
            if(per&&per.dividend_yield&&per.dividend_yield>=4){tags.push(['高殖利率','tag-pos']);reasons.push(`殖利率約 ${per.dividend_yield}%，適合穩定現金流。`);}
            return {tags,summary:reasons.join('')||'依目前技術與基本面資料綜合判斷。',chg};
        }
        async function render(ticker){
            const [rows,perArr,info]=await Promise.all([getJSON('TaiwanStockPrice',ticker,120),getJSON('TaiwanStockPER',ticker,30),getInfo(ticker)]);
            const per = (perArr&&perArr.length)?perArr[perArr.length-1]:null;
            const isFinance = info && info.industry_category==='金融保險';
            const fin=await getFin(ticker,isFinance);
            // 財務比率（資產負債表+損益表，獨立抓取不阻塞主流程）
            let ratios=null;
            try{ ratios=await getRatios(ticker,isFinance); }catch(e){ ratios=null; }
            if(!rows||!rows.length) throw new Error('no_data');
            const last=rows[rows.length-1], prev=rows.length>1?rows[rows.length-2]:last;
            const closes=rows.map(r=>r.close);
            const ma20=ma(closes,20),ma60=ma(closes,60),rsiVal=rsi(closes);
            const close=last.close,prevClose=prev.close;
            const {tags,summary,chg}=buildAdvice({close,prevClose,per,ma20,ma60,rsiVal});
            const cc=chg>0?'up':(chg<0?'down':'flat'); const sign=chg>0?'+':'';
            const name=info?info.stock_name:ticker;
            const industry=info?info.industry_category:'—';
            const tagHtml=tags.map(t=>`<span class="tag ${t[1]}">${t[0]}</span>`).join('');
            const finHtml = fin ? `
                <div class="info-box">
                    <strong>📄 公司基本資料</strong><br>
                    公司名稱：${name}（${ticker}）<br>
                    所屬產業：${industry}<br>
                    最新財報季：${fin.date}<br>
                    每股盈餘 (EPS)：${fin.eps!==null?fin.eps:'—'}<br>
                    營收：${fmtNum(fin.revenue)}<br>
                    ${fin.isFinance?'':`毛利：${fmtNum(fin.grossProfit)}<br>`}
                    稅後淨利：${fmtNum(fin.netIncome)}
                </div>` : `<div class="info-box">公司名稱：${name}（${ticker}）<br>所屬產業：${industry}</div>`;
            // 財務比率區塊
            const ratioHtml = ratios ? (()=>{
                const R=ratios;
                const N_A='金融業不適用';
                const asof = `資料時間點：${R.date} 財報`;
                const f2=v=>v===null||v===undefined?'—':(typeof v==='string'?v:v.toFixed(2));
                const f1=v=>v===null||v===undefined?'—':(typeof v==='string'?v:v.toFixed(1));
                const pct=v=>v===null||v===undefined?'—':(typeof v==='string'?v:v.toFixed(2)+'%');
                // 指標項目（含 ❓ tooltip：公式 + 資料時間點）
                const mi=(label,value,formula)=>`<div class="ratio-item"><span class="rl">${label}<span class="qm">?<span class="tip"><b>公式：</b>${formula}<br>${asof}</span></span></span><span class="rv">${value}</span></div>`;
                const sec=(title,items)=>`<div class="ratio-sec"><div class="ratio-sec-title">${title}</div><div class="ratio-grid">${items.join('')}</div></div>`;
                let dupont='';
                if(R.dupont){
                    if(R.dupont.finance){
                        dupont=`<div class="dupont">杜邦分解（金融業簡化）：ROE = 總資產報酬率 ROA(${(R.dupont.roa*100).toFixed(2)}%) × 權益乘數(${R.dupont.equityMult.toFixed(2)}) = <b>${f1(R.dupont.roe)}%</b></div>`;
                    }else{
                        dupont=`<div class="dupont">杜邦分解：ROE = 純益率(${(R.dupont.netMargin*100).toFixed(2)}%) × 總資產周轉率(${R.dupont.taTurnover.toFixed(2)}) × 權益乘數(${R.dupont.equityMult.toFixed(2)}) = <b>${f1(R.dupont.roe)}%</b></div>`;
                    }
                }
                const liquidity = R.isFinance
                    ? sec('1. 流動性比率',[
                        mi('現金佔總負債比',pct(R.cashRatio),'現金及約當現金 ÷ 總負債'),
                        mi('流動比率',N_A,'金融業以放款/契約負債為主，無存貨與應收，流動比率不適用'),
                        mi('速動比率',N_A,'同上')
                      ])
                    : sec('1. 流動性比率',[
                        mi('流動比率',f2(R.currentRatio),'流動資產 ÷ 流動負債'),
                        mi('速動比率',f2(R.quickRatio),'(流動資產 − 存貨) ÷ 流動負債'),
                        mi('現金流量比','—','來自現金流量表（FinMind 免費未提供）')
                      ]);
                const assetMgmt = R.isFinance
                    ? sec('2. 資產管理能力比率',[
                        mi('資產周轉率(營收/總資產)',f2(R.taTurnover)+' 次','營收 ÷ 總資產'),
                        mi('應收帳款週轉率',N_A,'金融業無應收帳款科目'),
                        mi('應收帳款天數',N_A,'—'),
                        mi('存貨週轉率',N_A,'金融業無存貨科目'),
                        mi('存貨出售天數',N_A,'—'),
                        mi('應付帳款周轉率',N_A,'金融業無應付帳款科目'),
                        mi('應付帳款天數',N_A,'—'),
                        mi('固定資產周轉率',N_A,'金融業以金融資產為主')
                      ])
                    : sec('2. 資產管理能力比率',[
                        mi('應收帳款週轉率',f2(R.arTurnover)+' 次','營收 ÷ 應收帳款淨額'),
                        mi('應收帳款天數',f1(R.arDays)+' 天','365 ÷ 應收帳款週轉率'),
                        mi('存貨週轉率',f2(R.invTurnover)+' 次','銷貨成本 ÷ 存貨'),
                        mi('存貨出售天數',f1(R.invDays)+' 天','365 ÷ 存貨週轉率'),
                        mi('應付帳款周轉率',f2(R.apTurnover)+' 次','銷貨成本 ÷ 應付帳款'),
                        mi('應付帳款天數',f1(R.apDays)+' 天','365 ÷ 應付帳款周轉率'),
                        mi('固定資產周轉率',f2(R.faTurnover)+' 次','營收 ÷ 固定資產(不動產廠房設備)'),
                        mi('總資產周轉率',f2(R.taTurnover)+' 次','營收 ÷ 總資產')
                      ]);
                const profit = R.isFinance
                    ? sec('4. 獲利能力比率',[
                        mi('淨利差 (NIM)',pct(R.nim),'利息淨收益 ÷ 總資產'),
                        mi('利息淨收益率',pct(R.netIntRatio),'利息淨收益 ÷ 營收'),
                        mi('純益率',pct(R.netMargin),'稅後淨利 ÷ 營收'),
                        mi('總資產報酬率 (ROA)',pct(R.roa),'稅後淨利 ÷ 總資產'),
                        mi('權益報酬率 (ROE)',pct(R.roe),'稅後淨利 ÷ 權益')
                      ])
                    : sec('4. 獲利能力比率',[
                        mi('毛利率',pct(R.grossMargin),'(營收 − 銷貨成本) ÷ 營收'),
                        mi('營運利益率',pct(R.opMargin),'營業利益 ÷ 營收'),
                        mi('純益率',pct(R.netMargin),'稅後淨利 ÷ 營收'),
                        mi('總資產報酬率 (ROA)',pct(R.roa),'稅後淨利 ÷ 總資產'),
                        mi('權益報酬率 (ROE)',pct(R.roe),'稅後淨利 ÷ 權益')
                      ]);
                return `
                <div class="info-box">
                    <strong>📊 財務比率分析</strong>（資料季別 ${R.date}，${R.isFinance?'金融業比率':'週轉率以期末餘額估算'}）<br>
                    ${liquidity}
                    ${assetMgmt}
                    ${sec('3. 負債管理能力比率',[mi('負債比率',pct(R.debtRatio),'總負債 ÷ 總資產')])}
                    <div style="font-size:12px;color:#a0aab2;margin:4px 0 8px;">※ 利息保障倍數需財務成本（利息費用）明細，將於接 FinMind 付費資料後提供。</div>
                    ${profit}
                    ${sec('5. 評價比率',[mi('本益比 (PER)',perDisplay(R.per, fin?fin.eps:null),'股價 ÷ 每股盈餘 (EPS)'),mi('市價淨值比 (PBR)',R.pbr!==null?R.pbr:'—','股價 ÷ 每股淨值')])}
                    ${dupont}
                </div>`;
            })() : `<div class="info-box">📊 財務比率分析：暫無資產負債表資料（${ticker} 可能為新掛牌或資料未揭露）。</div>`;
            const html = `
                <div class="stock-header">
                    <span class="stock-name">${name}</span>
                    <span class="stock-code">${ticker}</span>
                    <span class="stock-industry">${industry}</span>
                    <span class="stock-date">日線資料 ${last.date}</span>
                </div>
                <div class="stock-price" id="realtimeBox">
                    <span class="price-num" id="rtPrice">${close.toLocaleString()}</span>
                    <span class="price-change ${cc}" id="rtChg">${sign}${chg.toFixed(2)}%（日線）</span>
                    <span id="rtTime" style="font-size:12px;color:#a0aab2;margin-left:8px;"></span>
                </div>
                ${finHtml}
                ${ratioHtml}
                <div class="metrics">
                    <div class="metric"><div class="metric-label">本益比</div><div class="metric-value">${perDisplay(per?per.PER:null, fin?fin.eps:null)}</div></div>
                    <div class="metric"><div class="metric-label">殖利率</div><div class="metric-value">${per&&per.dividend_yield!==null&&per.dividend_yield!==undefined?per.dividend_yield+'%':'—'}</div></div>
                    <div class="metric"><div class="metric-label">股價淨值比</div><div class="metric-value">${per&&per.PBR!==null&&per.PBR!==undefined?per.PBR:'—'}</div></div>
                    <div class="metric"><div class="metric-label">MA20</div><div class="metric-value">${ma20?ma20.toFixed(1):'—'}</div></div>
                    <div class="metric"><div class="metric-label">MA60</div><div class="metric-value">${ma60?ma60.toFixed(1):'—'}</div></div>
                    <div class="metric"><div class="metric-label">RSI(14)</div><div class="metric-value">${rsiVal!==null?rsiVal:'—'}</div></div>
                </div>
                <div class="tags">${tagHtml}</div>
                <div class="advice">
                    <div class="advice-title">📊 投資建議</div>
                    <div>${summary}投資人可結合自身風險屬性與投資期限決定配置比重，建議分批進場以分散時點風險。</div>
                </div>
                <div class="disclaimer">本網頁內容僅供參考，非買賣邀約或投資建議。投資有風險，過去績效不代表未來表現，請依自身風險承受度審慎評估，必要時諮詢合格證券投顧或財務顧問。股價即時盤來源為證交所公開資料（經 Cloudflare Worker 代理），日線與基本面來源為 FinMind 公開 API，可能有延遲或誤差。</div>
            `;
            return html;
        }
        let rtTimer=null;
        async function pollRealtime(ticker){
            const rt=await getRealtime(ticker);
            if(!rt.ok) return;
            const elPrice=document.getElementById('rtPrice');
            const elChg=document.getElementById('rtChg');
            const elTime=document.getElementById('rtTime');
            if(!elPrice) return;
            const chgPct=((rt.price-rt.prev)/rt.prev*100);
            const cc=chgPct>0?'up':(chgPct<0?'down':'flat');
            const sign=chgPct>0?'+':'';
            elPrice.textContent=rt.price.toLocaleString();
            elChg.className='price-change '+cc;
            elChg.textContent=`${sign}${chgPct.toFixed(2)}%（即時）`;
            elTime.textContent='盤中 '+rt.time;
        }
        function show(html,isErr){ const b=document.getElementById('result'); b.innerHTML=isErr?`<div class="error-box">${html}</div>`:html; }
        async function run(){
            const ticker=document.getElementById('ticker').value.trim().toUpperCase();
            if(!ticker){show('請輸入有效的股票代號。',true);return;}
            if(!/^\d{4,5}$/.test(ticker)){show('台股代號應為 4–5 位數字（例如 2330）。',true);return;}
            if(rtTimer){ clearInterval(rtTimer); rtTimer=null; }
            show('<div class="loading">正在取得即時資料、技術指標與公司基本資料…</div>',false);
            try{
                show(await render(ticker),false);
                // 啟動盤中即時輪詢（每 5 秒）
                pollRealtime(ticker);
                rtTimer=setInterval(()=>pollRealtime(ticker),5000);
            }
            catch(e){ show(`無法取得 ${ticker} 的資料。可能原因：<br>1. 該代號非上市櫃股票或暫無交易。<br>2. FinMind API 暫時無法連線。<br><br>請確認代號正確，或稍後再試。`,true); }
        }
        // 問卷
        document.querySelectorAll('.opts').forEach(g=>{
            g.addEventListener('click',e=>{
                if(e.target.classList.contains('opt')){
                    g.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
                    e.target.classList.add('sel');
                }
            });
        });
        document.getElementById('quizBtn').addEventListener('click',()=>{
            const ans={};
            document.querySelectorAll('.opts').forEach(g=>{
                const sel=g.querySelector('.opt.sel');
                ans[g.dataset.q]=sel?sel.dataset.v:null;
            });
            const missing=Object.entries(ans).filter(([k,v])=>!v).map(([k])=>k);
            const box=document.getElementById('quizResult');
            if(missing.length){ box.innerHTML=`<div class="error-box">請完整回答所有問題（尚缺：${missing.join('、')}）。</div>`; return; }
            const rec=recommend(ans);
            if(!rec.length){ box.innerHTML=`<div class="error-box">依目前設定暫無合適標的，請調整偏好。</div>`; return; }
            box.innerHTML=`<div class="advice"><div class="advice-title">🎯 依您的屬性推薦標的（Top 5）</div>
                <div class="rec-list">${rec.map((s,i)=>`
                    <div class="rec-card" data-code="${s.code}" style="cursor:pointer;">
                        <div class="rec-rank">${i+1}</div>
                        <div class="rec-info">
                            <div class="rec-name">${s.name}（${s.code}）</div>
                            <div class="rec-ind">${s.industry}</div>
                            <div class="rec-score">契合度 ${s.score}</div>
                        </div>
                        <div class="rec-go">▶ 分析</div>
                    </div>`).join('')}</div>
                <div style="margin-top:10px;font-size:13px;color:#7f8c8d;">點擊任一標的卡片，即自動帶入上方輸入框並執行個股分析。</div>
            </div>`;
            box.querySelectorAll('.rec-card').forEach(card=>{
                card.addEventListener('click',()=>{
                    const code=card.getAttribute('data-code');
                    document.getElementById('ticker').value=code;
                    run();
                    window.scrollTo({top:0,behavior:'smooth'});
                });
            });
        });
        document.getElementById('fetchBtn').addEventListener('click',run);
        document.getElementById('ticker').addEventListener('keypress',e=>{if(e.key==='Enter')run();});
        document.getElementById('ticker').focus();
    </script>
</body>
</html>
