<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資建議系統</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #1a2a3a;
            margin: 0 0 8px;
            font-size: 26px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            padding: 14px 26px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(52,152,219,0.35); }
        button:active { transform: translateY(0); }
        #result { margin-top: 8px; }
        .placeholder {
            text-align: center;
            color: #95a5a6;
            padding: 40px 20px;
            font-size: 15px;
        }
        .stock-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 18px;
        }
        .stock-name { font-size: 22px; font-weight: 700; color: #1a2a3a; }
        .stock-code { font-size: 15px; color: #7f8c8d; }
        .stock-price { margin-left: auto; text-align: right; }
        .price-num { font-size: 24px; font-weight: 700; color: #1a2a3a; }
        .price-change { font-size: 14px; font-weight: 600; }
        .up { color: #e74c3c; }   /* 台股慣例：漲紅 */
        .down { color: #27ae60; } /* 台股慣例：跌綠 */
        .flat { color: #7f8c8d; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .metric {
            background: #f8fafc;
            border: 1px solid #edf1f5;
            border-radius: 10px;
            padding: 14px 16px;
        }
        .metric-label { font-size: 13px; color: #7f8c8d; margin-bottom: 4px; }
        .metric-value { font-size: 18px; font-weight: 600; color: #1a2a3a; }
        .advice {
            background: linear-gradient(135deg, #eef6ff, #f4f9ff);
            border-left: 4px solid #3498db;
            border-radius: 10px;
            padding: 18px 20px;
            line-height: 1.7;
            color: #2c3e50;
            font-size: 15px;
        }
        .advice-title {
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .disclaimer {
            margin-top: 20px;
            font-size: 12px;
            color: #a0aab2;
            line-height: 1.6;
            border-top: 1px dashed #e0e6ed;
            padding-top: 14px;
        }
        .loading { text-align: center; color: #95a5a6; padding: 40px; font-style: italic; }
        .error-box {
            background: #fdf2f2;
            border-left: 4px solid #e74c3c;
            border-radius: 10px;
            padding: 18px 20px;
            color: #c0392b;
            line-height: 1.7;
        }
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .input-group { flex-direction: column; }
            .metrics { grid-template-columns: 1fr; }
            .stock-header { flex-wrap: wrap; }
            .stock-price { margin-left: 0; text-align: left; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 投資建議系統</h1>
        <div class="subtitle">輸入台股代號，取得基本面分析與投資建議</div>
        <div class="input-group">
            <input type="text" id="ticker" placeholder="輸入台股代號（例如 2330）" maxlength="6">
            <button id="fetchBtn">取得建議</button>
        </div>
        <div id="result">
            <div class="placeholder">請輸入股票代號以取得投資分析</div>
        </div>
    </div>

    <script>
        const stockData = {
            '2330': {
                name: '台積電',
                price: '2,415.50',
                change: '+2.03%',
                pe: '32.47',
                industryPe: '71.61',
                dividendYield: '約 2.1%',
                recommendation: '中長期成長兼具價值特性。本益比 32.47 顯著低於同業平均 71.61，估值相對便宜；公司於 3 奈米／2 奈米製程與先進封裝（CoWoS、InFO）領先全球，受惠 AI、高效能運算與 5G 長期需求。建議：可採分批布局、長期持有；若短期市場回檔為加碼時機。'
            },
            '2317': {
                name: '鴻海',
                price: '237.50',
                change: '0.00%',
                pe: '12.50',
                industryPe: '15.20',
                dividendYield: '約 4.5%',
                recommendation: '穩健型防禦標的。本益比處於歷史低位，殖利率約 4.5% 提供穩定現金流；iPhone 新機週期與電動車代工訂單為中期成長動能。適合保守型投資人作為核心配息部位，亦可留意 AI 伺服器組裝帶來的評價修復機會。'
            },
            '2454': {
                name: '聯發科',
                price: '3,925.00',
                change: '+1.75%',
                pe: '18.90',
                industryPe: '22.30',
                dividendYield: '約 2.8%',
                recommendation: '成長型科技標的。Dimensity 旗艦晶片市佔提升，AI PC 與邊緣 AI 需求開啟新成長曲線；本益比低於同業平均，評價具吸引力。建議作為科技成長核心持股，並持續關注次世代旗艦平台與客戶導入進度。'
            }
        };

        function changeClass(ch) {
            if (ch.startsWith('+')) return 'up';
            if (ch.startsWith('-')) return 'down';
            return 'flat';
        }

        function render(data, ticker) {
            const cc = changeClass(data.change);
            return `
                <div class="stock-header">
                    <span class="stock-name">${data.name}</span>
                    <span class="stock-code">${ticker}</span>
                    <div class="stock-price">
                        <div class="price-num">${data.price}</div>
                        <div class="price-change ${cc}">${data.change}</div>
                    </div>
                </div>
                <div class="metrics">
                    <div class="metric"><div class="metric-label">本益比 (PE)</div><div class="metric-value">${data.pe}</div></div>
                    <div class="metric"><div class="metric-label">同業平均 PE</div><div class="metric-value">${data.industryPe}</div></div>
                    <div class="metric"><div class="metric-label">股利殖利率</div><div class="metric-value">${data.dividendYield}</div></div>
                    <div class="metric"><div class="metric-label">當日漲跌</div><div class="metric-value ${cc}">${data.change}</div></div>
                </div>
                <div class="advice">
                    <div class="advice-title">📊 投資建議</div>
                    <div>${data.recommendation}</div>
                </div>
                <div class="disclaimer">
                    本網頁內容僅供參考，非買賣邀約或投資建議。投資有風險，過去績效不代表未來表現，請依自身風險承受度審慎評估，必要時諮詢合格證券投顧或財務顧問。
                </div>
            `;
        }

        function show(html, isError) {
            const box = document.getElementById('result');
            box.innerHTML = isError ? `<div class="error-box">${html}</div>` : html;
        }

        async function run() {
            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            if (!ticker) { show('請輸入有效的股票代號。', true); return; }
            show('<div class="loading">正在分析中…</div>', false);
            await new Promise(r => setTimeout(r, 600));
            const data = stockData[ticker];
            if (data) {
                show(render(data, ticker), false);
            } else {
                show(`目前資料庫僅收錄 2330、2317、2454 三支示範標的，尚無 ${ticker} 的資料。<br><br>建議：<br>1. 確認代號是否為台股 4–5 位數字（如 2330）。<br>2. 先以示範標的測試功能。<br>3. 實際投資前請參考專業顧問意見並做好風險評估。`, true);
            }
        }

        document.getElementById('fetchBtn').addEventListener('click', run);
        document.getElementById('ticker').addEventListener('keypress', e => { if (e.key === 'Enter') run(); });
        document.getElementById('ticker').focus();
    </script>
</body>
</html>
